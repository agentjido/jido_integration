<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="jido-title jido-desc">
  <title id="jido-title">Jido Integration</title>
  <desc id="jido-desc">A hexagonal connector gateway with auth lock, leased runtime hub, provider plugs, and tenant-scoped lower facts.</desc>
